name: generate snake animation 生成贪吃蛇动画

on:
    schedule:
        - cron: "0 */24 * * *" # 每天 0 点 0 分触发
    workflow_dispatch: # 允许随时手动运行作业
    push:
        branches:
            - main # 推送到 main 分支上时触发

jobs:
    generate:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
            - name: generate snake.svg 生成贪吃蛇动画
              uses: Platane/snk/svg-only@v3
              with:
                  github_user_name: ${{ github.repository_owner }}
                  outputs: |
                      dist/github-contribution-grid-snake-light.svg?color_snake=orange&palette=github-light
                      dist/github-contribution-grid-snake-dark.svg?color_snake=#4489ec&palette=github-dark

            - name: Generate stats and top-langs SVGs
              env:
                  PROFILE_TOKEN: ${{ secrets.TOKEN }}
                  PROFILE_FALLBACK_TOKEN: ${{ github.token }}
                  PROFILE_LOGIN: ${{ github.repository_owner }}
                  PROFILE_INCLUDE_PRIVATE: ${{ secrets.TOKEN != '' }}
              run: node scripts/generate-profile-cards.mjs

            # push the content of <build_dir> to a branch
            # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file> , or as github page
            - name: push svg to the output branch 推送动画到 output 分支
              uses: crazy-max/ghaction-github-pages@v3.1.0
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
